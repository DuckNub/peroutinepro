<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motivation by Duc - Pro v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans overflow-x-hidden">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-800 text-center">
            <h1 class="text-4xl font-black mb-2 text-blue-500">PEROUTINEPRO</h1>
            <p class="text-slate-500 mb-8 text-sm uppercase tracking-widest font-bold italic">Áp lực tạo kim cương!</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-800 rounded-2xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-6 bg-slate-800 rounded-2xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-3">
                <button onclick="handleAction('signup')" class="flex-1 bg-slate-700 p-4 rounded-2xl font-bold active:scale-95 transition">Đăng ký</button>
                <button onclick="handleAction('login')" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold active:scale-95 transition">Đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-xl mx-auto p-4 sm:p-6 pb-24">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <h2 class="text-2xl font-extrabold text-white truncate max-w-[180px]" id="userNameDisplay">Chào bạn!</h2>
                    <button onclick="changeDisplayName()" class="p-1 text-slate-500 hover:text-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                        </svg>
                    </button>
                </div>
                <div class="flex items-center gap-2 mt-1">
                    <span class="bg-orange-500/20 text-orange-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">🔥 Streak: <span id="streakCount">0</span> Ngày</span>
                </div>
            </div>
            <button onclick="auth.signOut()" class="bg-slate-800 p-2 rounded-xl text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <div class="bg-slate-900 p-6 rounded-3xl mb-6 border border-slate-800">
            <div class="flex justify-between items-end mb-4">
                <input type="date" id="datePicker" class="bg-transparent text-xl font-black focus:outline-none text-blue-400 uppercase" onchange="loadData()">
                <div class="text-right">
                    <span id="percentText" class="text-3xl font-black text-white">0%</span>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700">
                <div id="progressBar" class="h-full bg-blue-500 transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex mb-6 border-b border-slate-800">
            <button onclick="switchTab('daily')" id="tabDaily" class="flex-1 py-3 font-bold tab-active">Thói quen</button>
            <button onclick="switchTab('once')" id="tabOnce" class="flex-1 py-3 font-bold text-slate-500 text-sm">Việc cần làm</button>
        </div>

        <div class="flex gap-2 mb-8 bg-slate-900 p-2 rounded-3xl border border-slate-800">
            <input type="text" id="taskInput" placeholder="Nhập tên nhiệm vụ..." class="flex-1 p-3 bg-transparent focus:outline-none text-white ml-2">
            <button onclick="addTask()" class="bg-blue-600 w-12 h-12 rounded-2xl font-black active:scale-90 transition">+</button>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDR2TYq-l5Fxzcx5dQ0a6OUEOHIQItZ2gE",
            authDomain: "perfect-routine-pro.firebaseapp.com",
            projectId: "perfect-routine-pro",
            storageBucket: "perfect-routine-pro.firebasestorage.app",
            messagingSenderId: "1032207716162",
            appId: "1:1032207716162:web:8f372b2d282dff5baa42db",
            measurementId: "G-BNQJBQ9YGP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentTab = 'daily';
        document.getElementById('datePicker').valueAsDate = new Date();

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabDaily').className = tab === 'daily' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-slate-500 text-sm';
            document.getElementById('tabOnce').className = tab === 'once' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-slate-500 text-sm';
            loadData();
        }

        async function handleAction(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (err) { alert(err.message); }
        }

        // Tính năng Đổi tên
        async function changeDisplayName() {
            const newName = prompt("Nhập tên hiển thị mới của bạn:");
            if (newName) {
                try {
                    // Lưu vào Profile của Auth
                    await auth.currentUser.updateProfile({ displayName: newName });
                    // Cập nhật giao diện
                    document.getElementById('userNameDisplay').innerText = `Chào ${newName}!`;
                } catch (err) { alert("Không đổi được tên: " + err.message); }
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                // Ưu tiên hiển thị displayName nếu có, không thì lấy email
                document.getElementById('userNameDisplay').innerText = `Chào ${user.displayName || user.email.split('@')[0]}!`;
                loadData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        });

        async function addTask() {
            const text = document.getElementById('taskInput').value;
            const date = document.getElementById('datePicker').value;
            if (!text) return;

            await db.collection("tasks").add({
                uid: auth.currentUser.uid,
                text: text,
                type: currentTab,
                date: date, // 'once' dùng cái này
                done: false, // 'once' dùng cái này
                doneDates: [], // 'daily' dùng mảng này để lưu các ngày đã tích
                timestamp: Date.now()
            });
            document.getElementById('taskInput').value = "";
            loadData();
        }

        async function loadData() {
            const date = document.getElementById('datePicker').value;
            const list = document.getElementById('taskList');
            list.innerHTML = "";

            let query = db.collection("tasks").where("uid", "==", auth.currentUser.uid).where("type", "==", currentTab);
            
            if(currentTab === 'once') {
                query = query.where("date", "==", date);
            }

            const snapshot = await query.get();
            let doneCount = 0;
            let total = 0;

            snapshot.forEach(doc => {
                total++;
                const data = doc.data();
                let isDone = (currentTab === 'daily') ? (data.doneDates && data.doneDates.includes(date)) : data.done;

                if (isDone) doneCount++;

                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-4 rounded-2xl border transition-all ${isDone ? 'bg-blue-900/20 border-blue-500/30' : 'bg-slate-900 border-slate-800'}`;
                item.innerHTML = `
                    <div class="flex-1 pr-4">
                        <span class="block font-bold ${isDone ? 'line-through text-slate-500' : 'text-white'}">${data.text}</span>
                        <span class="text-[9px] uppercase font-black text-slate-600">${currentTab === 'daily' ? 'DAILY ROUTINE' : 'SINGLE TASK'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleTask('${doc.id}', ${isDone})" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center">${isDone ? '✅' : '✔️'}</button>
                        <button onclick="deleteTask('${doc.id}')" class="text-slate-700 p-1">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });

            updateProgress(doneCount, total);
        }

        async function toggleTask(id, isDone) {
            const date = document.getElementById('datePicker').value;
            const ref = db.collection("tasks").doc(id);
            if(currentTab === 'daily') {
                if(!isDone) await ref.update({ doneDates: firebase.firestore.FieldValue.arrayUnion(date) });
                else await ref.update({ doneDates: firebase.firestore.FieldValue.arrayRemove(date) });
            } else {
                await ref.update({ done: !isDone });
            }
            loadData();
        }

        async function deleteTask(id) {
            if(confirm("Xóa nhiệm vụ?")) {
                await db.collection("tasks").doc(id).delete();
                loadData();
            }
        }

        function updateProgress(done, total) {
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            const bar = document.getElementById('progressBar');
            bar.style.width = percent + "%";
            document.getElementById('percentText').innerText = percent + "%";
            bar.className = percent >= 80 ? "h-full bg-green-500 transition-all shadow-[0_0_15px_rgba(34,197,94,0.4)]" : "h-full bg-blue-500 transition-all";
            
            // Logic Streak tạm thời (Sẽ tính sâu hơn ở bản sau)
            if(percent >= 80) document.getElementById('streakCount').innerText = "1+";
            else document.getElementById('streakCount').innerText = "0";
        }
    </script>
</body>
</html>
