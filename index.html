<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kỷ Luật Việt - Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans overflow-x-hidden">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-800">
            <h1 class="text-4xl font-black mb-2 text-center text-blue-500">KỶ LUẬT</h1>
            <p class="text-slate-500 text-center mb-8 text-sm uppercase tracking-widest font-bold">Perfect Routine</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-slate-800 rounded-2xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-6 bg-slate-800 rounded-2xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            <div class="flex gap-3">
                <button onclick="handleAction('signup')" class="flex-1 bg-slate-700 p-4 rounded-2xl font-bold active:scale-95 transition">Đăng ký</button>
                <button onclick="handleAction('login')" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold active:scale-95 transition">Đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-xl mx-auto p-4 sm:p-6 pb-24">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h2 class="text-2xl font-extrabold text-white" id="userNameDisplay">Chào Ngọc!</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="bg-orange-500/20 text-orange-500 px-3 py-1 rounded-full text-xs font-black uppercase">🔥 Streak: <span id="streakCount">0</span> Ngày</span>
                </div>
            </div>
            <button onclick="auth.signOut()" class="bg-slate-800 p-2 rounded-xl text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <div class="bg-slate-900 p-6 rounded-3xl mb-6 border border-slate-800">
            <div class="flex justify-between items-end mb-4">
                <input type="date" id="datePicker" class="bg-transparent text-xl font-black focus:outline-none cursor-pointer text-blue-400" onchange="loadData()">
                <div class="text-right">
                    <span id="percentText" class="text-3xl font-black text-white">0%</span>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700">
                <div id="progressBar" class="h-full bg-blue-500 transition-all duration-700 shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex mb-6 border-b border-slate-800">
            <button onclick="switchTab('daily')" id="tabDaily" class="flex-1 py-3 font-bold tab-active transition">Thói quen (Daily)</button>
            <button onclick="switchTab('once')" id="tabOnce" class="flex-1 py-3 font-bold text-slate-500 transition">Việc cần làm</button>
        </div>

        <div class="flex gap-2 mb-8">
            <input type="text" id="taskInput" placeholder="Thêm thói quen/việc mới..." class="flex-1 p-4 bg-slate-900 rounded-2xl border border-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            <button onclick="addTask()" class="bg-blue-600 px-6 rounded-2xl font-black active:scale-90 transition">+</button>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDR2TYq-l5Fxzcx5dQ0a6OUEOHIQItZ2gE",
            authDomain: "perfect-routine-pro.firebaseapp.com",
            projectId: "perfect-routine-pro",
            storageBucket: "perfect-routine-pro.firebasestorage.app",
            messagingSenderId: "1032207716162",
            appId: "1:1032207716162:web:8f372b2d282dff5baa42db",
            measurementId: "G-BNQJBQ9YGP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentTab = 'daily';
        document.getElementById('datePicker').valueAsDate = new Date();

        // 1. Quản lý Tab
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabDaily').className = tab === 'daily' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-slate-500';
            document.getElementById('tabOnce').className = tab === 'once' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-slate-500';
            loadData();
        }

        // 2. Auth
        async function handleAction(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Vui lòng nhập đủ thông tin!");
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = `Chào ${user.email.split('@')[0]}!`;
                loadData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        });

        // 3. Xử lý Task
        async function addTask() {
            const text = document.getElementById('taskInput').value;
            const date = document.getElementById('datePicker').value;
            if (!text) return;

            await db.collection("tasks").add({
                uid: auth.currentUser.uid,
                text: text,
                type: currentTab, // 'daily' hoặc 'once'
                date: date,
                done: false, // Riêng 'once' dùng trường này
                doneDates: [], // Riêng 'daily' lưu các ngày đã hoàn thành vào mảng
                timestamp: Date.now()
            });
            document.getElementById('taskInput').value = "";
            loadData();
        }

        async function loadData() {
            const date = document.getElementById('datePicker').value;
            const list = document.getElementById('taskList');
            list.innerHTML = `<div class="text-center py-10 text-slate-600 font-bold">Đang tải...</div>`;

            // Lọc task theo Tab và UID
            let query = db.collection("tasks").where("uid", "==", auth.currentUser.uid).where("type", "==", currentTab);
            
            // Nếu là Tab 'once', chỉ lấy task của ngày đã chọn
            if(currentTab === 'once') {
                query = query.where("date", "==", date);
            }

            const snapshot = await query.get();
            list.innerHTML = "";
            let doneCount = 0;
            let total = 0;

            snapshot.forEach(doc => {
                total++;
                const data = doc.data();
                let isDone = false;
                
                if(currentTab === 'daily') {
                    isDone = data.doneDates && data.doneDates.includes(date);
                } else {
                    isDone = data.done;
                }

                if (isDone) doneCount++;

                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-5 rounded-2xl border transition-all duration-300 ${isDone ? 'bg-blue-600/10 border-blue-500/50 opacity-70' : 'bg-slate-900 border-slate-800 shadow-lg'}`;
                item.innerHTML = `
                    <div class="flex-1 pr-4">
                        <span class="block font-bold ${isDone ? 'line-through text-slate-500' : 'text-white'}">${data.text}</span>
                        <span class="text-[10px] uppercase font-black tracking-tighter ${isDone ? 'text-blue-500' : 'text-slate-600'}">${currentTab === 'daily' ? 'Thói quen' : 'Việc lẻ'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleTask('${doc.id}', ${isDone})" class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-800 active:scale-75 transition">${isDone ? '✅' : '✔️'}</button>
                        <button onclick="deleteTask('${doc.id}')" class="text-slate-600 p-2">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });

            updateProgress(doneCount, total);
            if(currentTab === 'daily') calculateStreak();
        }

        async function toggleTask(id, isDone) {
            const date = document.getElementById('datePicker').value;
            const taskRef = db.collection("tasks").doc(id);

            if(currentTab === 'daily') {
                if(!isDone) {
                    await taskRef.update({ doneDates: firebase.firestore.FieldValue.arrayUnion(date) });
                } else {
                    await taskRef.update({ doneDates: firebase.firestore.FieldValue.arrayRemove(date) });
                }
            } else {
                await taskRef.update({ done: !isDone });
            }
            loadData();
        }

        async function deleteTask(id) {
            if(confirm("Xóa nhiệm vụ này?")) {
                await db.collection("tasks").doc(id).delete();
                loadData();
            }
        }

        function updateProgress(done, total) {
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            const bar = document.getElementById('progressBar');
            bar.style.width = percent + "%";
            document.getElementById('percentText').innerText = percent + "%";
            
            if (percent >= 80) bar.className = "h-full bg-green-500 transition-all duration-700 shadow-[0_0_15px_rgba(34,197,94,0.5)]";
            else bar.className = "h-full bg-blue-500 transition-all duration-700 shadow-[0_0_15px_rgba(59,130,246,0.5)]";
        }

        async function calculateStreak() {
            // Logic tính streak dựa trên thói quen hàng ngày (đơn giản hóa)
            // Quét ngược lại 30 ngày gần nhất để đếm chuỗi
            document.getElementById('streakCount').innerText = "...";
            // Tạm thời hiển thị 1 nếu hôm nay đạt 80% (Bản sau sẽ quét sâu hơn)
            const p = parseInt(document.getElementById('percentText').innerText);
            if(p >= 80) document.getElementById('streakCount').innerText = "1+";
            else document.getElementById('streakCount').innerText = "0";
        }
    </script>
</body>
</html>
