<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motivation by Duc</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; background-image: radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%); background-attachment: fixed; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .calendar-day.active { border: 2px solid #6366f1; background: rgba(99, 102, 241, 0.1); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        .sortable-ghost { opacity: 0.1; background: #6366f1 !important; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-1 italic uppercase tracking-tighter text-white">PEROUTINEPRO</h1>
            <p class="text-slate-500 mb-10 text-[10px] uppercase font-bold italic tracking-widest">áp lực tạo kim cương</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 rounded-2xl border border-white/5 outline-none">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-8 bg-white/5 rounded-2xl border border-white/5 outline-none">
            
            <div class="flex gap-3">
                <button onclick="handleAction('signup')" class="flex-1 bg-slate-800 p-4 rounded-2xl font-bold hover:bg-slate-700 transition active:scale-95 border border-white/5">Đăng ký</button>
                <button onclick="handleAction('login')" class="flex-1 bg-indigo-600 p-4 rounded-2xl font-bold active:scale-95 transition shadow-lg shadow-indigo-900/20">Vào thôi!</button>
            </div>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-xl mx-auto p-4 sm:p-6">
        <header class="flex justify-between items-center mb-8 pt-6">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img id="userAvatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-12 h-12 rounded-xl object-cover border border-white/10 shadow-lg">
                    <button onclick="updateProfile()" class="absolute -bottom-1 -right-1 bg-indigo-600 text-white p-1 rounded-lg text-[10px] shadow-lg">✏️</button>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-white" id="userNameDisplay">Chào Đức dê zét</h2>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest" id="streakDisplay">🔥 0 NGÀY</p>
                </div>
            </div>
            <button onclick="auth.signOut()" class="opacity-30 hover:opacity-100 transition">🚪</button>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-6">
            <div class="flex justify-between items-center mb-4">
                <input type="date" id="datePicker" class="bg-transparent text-xl font-bold text-indigo-400 outline-none uppercase" onchange="dateChanged()">
                <div class="text-right"><span id="percentText" class="text-3xl font-black italic text-white">0%</span></div>
            </div>
            <div class="w-full bg-black/30 h-2 rounded-full overflow-hidden border border-white/5">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-rose-400 transition-all duration-1000 shadow-[0_0_15px_rgba(99,102,241,0.3)]" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex mb-8 p-1 glass rounded-2xl">
            <button onclick="switchTab('tasks')" id="tabTasks" class="flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase">Nhiệm vụ</button>
            <button onclick="switchTab('details')" id="tabDetails" class="flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase">Chi tiết 📅</button>
        </nav>

        <div id="contentBox">
            <div id="taskView">
                <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500 px-2 mb-4">
                    <button onclick="switchSub('daily')" id="subD" class="text-indigo-400 border-b-2 border-indigo-400 pb-1">Thói quen</button>
                    <button onclick="switchSub('once')" id="subO" class="pb-1">Việc lẻ</button>
                </div>
                <div class="flex gap-2 mb-8 glass p-1.5 rounded-2xl">
                    <input type="text" id="taskInput" placeholder="Thêm mục tiêu..." class="flex-1 p-3 bg-transparent outline-none text-sm ml-2">
                    <button onclick="addTask()" class="bg-indigo-600 w-11 h-11 rounded-xl font-bold text-2xl active:scale-90 transition shadow-lg">+</button>
                </div>
                <div id="taskList" class="space-y-3 min-h-[100px]"></div>
            </div>

            <div id="detailsView" class="hidden space-y-6">
                <div class="glass p-5 rounded-3xl">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <button onclick="changeMonth(-1)" class="text-indigo-400 p-1">◀</button>
                        <h3 id="monthLabel" class="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Tháng 5, 2026</h3>
                        <button onclick="changeMonth(1)" class="text-indigo-400 p-1">▶</button>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1.5 text-center text-[9px] font-bold text-slate-700 uppercase"></div>
                </div>
                <div class="glass p-6 rounded-3xl space-y-5">
                    <div class="flex justify-between items-center border-b border-white/5 pb-3">
                        <h3 class="text-xs font-black uppercase text-indigo-400 italic">Báo cáo kỷ luật</h3>
                        <span id="summaryText" class="text-[10px] text-slate-500 font-bold">0/0</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="reportScreenTime" placeholder="📱 Điện thoại" class="bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5">
                        <input type="text" id="reportEnergy" placeholder="⚡ Năng lượng" class="bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5">
                    </div>
                    <input type="text" id="reportBigWin" placeholder="🏆 Thành tựu lớn nhất" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5">
                    <textarea id="diaryInput" placeholder="✍️ Nhật ký..." class="w-full h-24 bg-white/5 rounded-2xl p-4 text-xs outline-none border border-white/5"></textarea>
                    <button onclick="saveDailyReport()" class="w-full bg-indigo-600 p-4 rounded-2xl text-xs font-bold shadow-lg">LƯU BÁO CÁO ✨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDR2TYq-l5Fxzcx5dQ0a6OUEOHIQItZ2gE",
            authDomain: "perfect-routine-pro.firebaseapp.com",
            projectId: "perfect-routine-pro",
            storageBucket: "perfect-routine-pro.firebasestorage.app",
            messagingSenderId: "1032207716162",
            appId: "1:1032207716162:web:8f372b2d282dff5baa42db",
            measurementId: "G-BNQJBQ9YGP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentSub = 'daily', viewMonth = new Date().getMonth(), viewYear = new Date().getFullYear();
        let unsubscribeTasks = null;

        // --- CÀI ĐẶT NGÀY GIỜ VIỆT NAM ---
        function setLocalDate() {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - offset)).toISOString().slice(0, 10);
            document.getElementById('datePicker').value = localISOTime;
        }
        setLocalDate();

        // --- XỬ LÝ ĐĂNG KÝ / ĐĂNG NHẬP ---
        async function handleAction(type) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if(!e || !p) return alert("Vui lòng nhập đủ Email và Mật khẩu!");
            try {
                if(type === 'signup') {
                    await auth.createUserWithEmailAndPassword(e, p);
                    alert("Chào mừng Đức dê zét đã gia nhập hàng ngũ kỷ luật!");
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch (err) { alert("Lỗi: " + err.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Chào " + (user.displayName || "Đức dê zét");
                if(user.photoURL) document.getElementById('userAvatar').src = user.photoURL;
                startTaskListener();
            } else {
                if (unsubscribeTasks) unsubscribeTasks();
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        });

        function startTaskListener() {
            if (unsubscribeTasks) unsubscribeTasks();
            unsubscribeTasks = db.collection("tasks").where("uid", "==", auth.currentUser.uid).onSnapshot(snap => { renderAll(snap); });
        }

        function renderAll(snap) {
            const date = document.getElementById('datePicker').value;
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            let allTasks = [];
            snap.forEach(doc => allTasks.push({id: doc.id, ...doc.data()}));
            allTasks.sort((a, b) => (a.order || a.timestamp) - (b.order || b.timestamp));

            let doneCount = 0, total = 0;
            allTasks.forEach(data => {
                const isToday = data.type === 'daily' || data.date === date;
                const isDoneToday = data.type === 'daily' ? (data.doneDates && data.doneDates.includes(date)) : (data.date === date && data.done);
                if(isToday) { total++; if(isDoneToday) doneCount++; }
                if(data.type === currentSub) {
                    if(currentSub === 'once' && data.date !== date) return;
                    const item = document.createElement('div');
                    item.setAttribute('data-id', data.id);
                    item.className = `glass p-4 rounded-2xl flex justify-between items-center cursor-move transition-all ${isDoneToday ? 'opacity-30' : ''}`;
                    item.innerHTML = `<span class="text-sm font-bold ${isDoneToday ? 'line-through text-slate-500' : 'text-white'}">${data.text}</span>
                        <div class="flex gap-2">
                            <button onclick="toggleTask('${data.id}', ${isDoneToday})" class="w-9 h-9 rounded-full ${isDoneToday ? 'bg-indigo-500' : 'bg-white/5'} flex items-center justify-center border border-white/10 transition-all">${isDoneToday ? '✓' : ''}</button>
                            <button onclick="editTask('${data.id}', '${data.text}')" class="p-2 opacity-20 hover:opacity-100">📝</button>
                            <button onclick="deleteTask('${data.id}')" class="p-2 opacity-20 hover:opacity-100">🗑️</button>
                        </div>`;
                    list.appendChild(item);
                }
            });

            const p = total === 0 ? 0 : Math.round((doneCount/total)*100);
            document.getElementById('progressBar').style.width = p + "%";
            document.getElementById('percentText').innerText = p + "%";
            document.getElementById('streakDisplay').innerText = `🔥 ${calculateRealStreak(allTasks)} NGÀY`;
            document.getElementById('summaryText').innerText = `${doneCount}/${total} Hoàn thành`;
            
            initSortable();
            if(document.getElementById('detailsView').style.display === 'block') generateCalendar(allTasks);
        }

        // --- CÁC HÀM STREAK & LOGIC (GIỮ NGUYÊN) ---
        function calculateRealStreak(allTasks) {
            if (allTasks.length === 0) return 0;
            let streak = 0; let checkDate = new Date();
            const isDaySuccessful = (dateStr) => {
                let dailyTasks = allTasks.filter(t => t.type === 'daily');
                if (dailyTasks.length === 0) return false;
                let done = dailyTasks.filter(t => t.doneDates && t.doneDates.includes(dateStr)).length;
                return (done / dailyTasks.length) >= 0.8;
            };
            while (true) {
                let dateStr = checkDate.toISOString().split('T')[0];
                if (isDaySuccessful(dateStr)) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
                else { if (streak === 0) { checkDate.setDate(checkDate.getDate() - 1); if (isDaySuccessful(checkDate.toISOString().split('T')[0])) {} else break; } else break; }
                if (streak > 1000) break;
            }
            return streak;
        }

        async function addTask() {
            const text = document.getElementById('taskInput').value, date = document.getElementById('datePicker').value;
            if(!text) return;
            await db.collection("tasks").add({ uid: auth.currentUser.uid, text, type: currentSub, date, done: false, doneDates: [], timestamp: Date.now(), order: Date.now() });
            document.getElementById('taskInput').value = "";
        }

        async function toggleTask(id, isDone) {
            const date = document.getElementById('datePicker').value, ref = db.collection("tasks").doc(id);
            if(currentSub === 'daily') {
                if(!isDone) await ref.update({ doneDates: firebase.firestore.FieldValue.arrayUnion(date) });
                else await ref.update({ doneDates: firebase.firestore.FieldValue.arrayRemove(date) });
            } else await ref.update({ done: !isDone });
        }

        function initSortable() {
            const list = document.getElementById('taskList');
            if (list.sortable) list.sortable.destroy();
            list.sortable = new Sortable(list, {
                animation: 150, ghostClass: 'sortable-ghost',
                onEnd: async function() {
                    const items = list.querySelectorAll('.glass');
                    const batch = db.batch();
                    items.forEach((item, index) => { batch.update(db.collection("tasks").doc(item.getAttribute('data-id')), { order: index }); });
                    await batch.commit();
                }
            });
        }

        function switchTab(tab) {
            document.getElementById('tabTasks').className = tab === 'tasks' ? 'flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase' : 'flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase';
            document.getElementById('tabDetails').className = tab === 'details' ? 'flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase' : 'flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase';
            document.getElementById('taskView').style.display = tab === 'tasks' ? 'block' : 'none';
            document.getElementById('detailsView').style.display = tab === 'details' ? 'block' : 'none';
            if(tab === 'details') loadDailyReport();
        }

        function switchSub(type) {
            currentSub = type;
            document.getElementById('subD').className = type === 'daily' ? 'text-indigo-400 border-b-2 border-indigo-400 pb-1' : 'pb-1';
            document.getElementById('subO').className = type === 'once' ? 'text-indigo-400 border-b-2 border-indigo-400 pb-1' : 'pb-1';
            db.collection("tasks").where("uid", "==", auth.currentUser.uid).get().then(snap => renderAll(snap));
        }

        function dateChanged() { db.collection("tasks").where("uid", "==", auth.currentUser.uid).get().then(snap => renderAll(snap)); if(document.getElementById('detailsView').style.display === 'block') loadDailyReport(); }
        async function editTask(id, oldText) { const newText = prompt("Sửa nhiệm vụ:", oldText); if(newText && newText !== oldText) await db.collection("tasks").doc(id).update({ text: newText }); }
        async function deleteTask(id) { if(confirm("Xóa nhé?")) await db.collection("tasks").doc(id).delete(); }

        async function loadDailyReport() {
            const date = document.getElementById('datePicker').value;
            const doc = await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('diaryInput').value = d.content || "";
                document.getElementById('reportScreenTime').value = d.screenTime || "";
                document.getElementById('reportEnergy').value = d.energy || "";
                document.getElementById('reportBigWin').value = d.bigWin || "";
            } else { ['diaryInput','reportScreenTime','reportEnergy','reportBigWin'].forEach(id => document.getElementById(id).value = ""); }
        }

        async function saveDailyReport() {
            const date = document.getElementById('datePicker').value;
            const r = { uid: auth.currentUser.uid, date, content: document.getElementById('diaryInput').value, screenTime: document.getElementById('reportScreenTime').value, energy: document.getElementById('reportEnergy').value, bigWin: document.getElementById('reportBigWin').value };
            await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).set(r, { merge: true });
            alert("Đã lưu báo cáo ✨");
        }

        function changeMonth(s) { viewMonth += s; if(viewMonth>11){viewMonth=0; viewYear++;} if(viewMonth<0){viewMonth=11; viewYear--;} db.collection("tasks").where("uid", "==", auth.currentUser.uid).get().then(snap => renderAll(snap)); }
        async function generateCalendar(allTasks) {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = "<div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>";
            document.getElementById('monthLabel').innerText = `Tháng ${viewMonth + 1}, ${viewYear}`;
            const first = new Date(viewYear, viewMonth, 1).getDay(), days = new Date(viewYear, viewMonth + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const div = document.createElement('div'), dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                div.className = `calendar-day ${document.getElementById('datePicker').value === dateStr ? 'active' : ''}`;
                div.innerHTML = `<span>${d}</span>`;
                let done = 0, totalInDay = 0;
                allTasks.forEach(t => { if(t.type === 'daily' || t.date === dateStr) { totalInDay++; if(t.type === 'daily' ? (t.doneDates && t.doneDates.includes(dateStr)) : t.done) done++; } });
                if(totalInDay > 0 && (done/totalInDay) >= 0.8) div.innerHTML += `<span class="text-[8px] mt-0.5">🔥</span>`;
                div.onclick = () => { document.getElementById('datePicker').value = dateStr; dateChanged(); };
                grid.appendChild(div);
            }
        }

        async function updateProfile() {
            const n = prompt("Tên của bạn:", auth.currentUser.displayName);
            const a = prompt("Link ảnh đại diện (URL):");
            if(n || a) { await auth.currentUser.updateProfile({ displayName: n, photoURL: a }); location.reload(); }
        }
    </script>
</body>
</html>
