<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motivation made by duc - Pro v12.1</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; background-image: radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%); background-attachment: fixed; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .calendar-day.active { border: 2px solid #6366f1; background: rgba(99, 102, 241, 0.1); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <div class="text-6xl mb-6">💎</div>
            <h1 class="text-3xl font-black mb-1 italic uppercase">PEROUTINEPRO</h1>
            <p class="text-slate-500 mb-10 text-[10px] uppercase font-bold italic">áp lực tạo kim cương</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 rounded-2xl border border-white/5 outline-none focus:border-indigo-500/40">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-8 bg-white/5 rounded-2xl border border-white/5 outline-none focus:border-indigo-500/40">
            <button onclick="handleAction('login')" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold active:scale-95 transition shadow-lg shadow-indigo-900/20">VÀO KỶ LUẬT</button>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-xl mx-auto p-4 sm:p-6">
        <header class="flex justify-between items-center mb-8 pt-6">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img id="userAvatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-12 h-12 rounded-xl object-cover border border-white/10 shadow-lg">
                    <button onclick="updateProfile()" class="absolute -bottom-1 -right-1 bg-indigo-600 text-white p-1 rounded-lg text-[10px] shadow-lg hover:scale-110 transition-all">✏️</button>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-white" id="userNameDisplay">Chiến binh</h2>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest" id="streakCount">🔥 0 Ngày</p>
                </div>
            </div>
            <button onclick="auth.signOut()" class="opacity-30 hover:opacity-100 transition">🚪</button>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-6">
            <div class="flex justify-between items-center mb-4">
                <input type="date" id="datePicker" class="bg-transparent text-xl font-bold text-indigo-400 outline-none uppercase" onchange="dateChanged()">
                <div class="text-right"><span id="percentText" class="text-3xl font-black italic">0%</span></div>
            </div>
            <div class="w-full bg-black/30 h-2 rounded-full overflow-hidden border border-white/5">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-rose-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex mb-8 p-1 glass rounded-2xl">
            <button onclick="switchTab('tasks')" id="tabTasks" class="flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase tracking-widest">Nhiệm vụ</button>
            <button onclick="switchTab('details')" id="tabDetails" class="flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase tracking-widest">Chi tiết 📅</button>
        </nav>

        <div id="contentBox">
            <div id="taskView">
                <div class="flex gap-4 text-[10px] font-black uppercase tracking-widest text-slate-500 px-2 mb-4">
                    <button onclick="switchSub('daily')" id="subD" class="text-indigo-400 border-b-2 border-indigo-400 pb-1 transition-all">Thói quen</button>
                    <button onclick="switchSub('once')" id="subO" class="pb-1 transition-all">Việc lẻ</button>
                </div>
                <div class="flex gap-2 mb-8 glass p-1.5 rounded-2xl">
                    <input type="text" id="taskInput" placeholder="Thêm mục tiêu tiếp theo..." class="flex-1 p-3 bg-transparent outline-none text-sm ml-2">
                    <button onclick="addTask()" class="bg-indigo-600 w-11 h-11 rounded-xl font-bold text-2xl active:scale-90 transition shadow-lg shadow-indigo-600/20">+</button>
                </div>
                <div id="taskList" class="space-y-3"></div>
            </div>

            <div id="detailsView" class="hidden space-y-6">
                <div class="glass p-5 rounded-3xl">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <button onclick="changeMonth(-1)" class="text-indigo-400 hover:text-white p-1">◀</button>
                        <h3 id="monthLabel" class="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Tháng 5, 2026</h3>
                        <button onclick="changeMonth(1)" class="text-indigo-400 hover:text-white p-1">▶</button>
                    </div>
                    <div class="grid grid-cols-7 gap-1.5 text-center text-[9px] font-bold text-slate-700 uppercase mb-2">
                        <div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1.5"></div>
                </div>

                <div class="glass p-6 rounded-3xl space-y-5">
                    <div class="flex justify-between items-center border-b border-white/5 pb-3">
                        <h3 class="text-xs font-black uppercase text-indigo-400 italic">Báo cáo kỷ luật</h3>
                        <span id="summaryText" class="text-[10px] text-slate-500 font-bold">Đang tải...</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[9px] uppercase font-black text-slate-500">📱 Điện thoại</label>
                            <input type="text" id="reportScreenTime" placeholder="3h 20p" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5 focus:border-indigo-500/40">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] uppercase font-black text-slate-500">⚡ Năng lượng</label>
                            <input type="text" id="reportEnergy" placeholder="Tốt/Đuối" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5 focus:border-indigo-500/40">
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-black text-slate-500">🏆 Thành tựu tự hào nhất</label>
                        <input type="text" id="reportBigWin" placeholder="Hôm nay bạn làm được gì?" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none border border-white/5 focus:border-indigo-500/40">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-black text-slate-500">✍️ Nhật ký & Tâm sự</label>
                        <textarea id="diaryInput" placeholder="Viết cho chính mình..." class="w-full h-24 bg-white/5 rounded-2xl p-4 text-xs outline-none border border-white/5 focus:border-indigo-500/40"></textarea>
                    </div>

                    <button onclick="saveDailyReport()" class="w-full bg-indigo-600 p-4 rounded-2xl text-xs font-bold shadow-lg shadow-indigo-900/30 active:scale-95 transition">LƯU BÁO CÁO NGÀY ✨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDR2TYq-l5Fxzcx5dQ0a6OUEOHIQItZ2gE",
            authDomain: "perfect-routine-pro.firebaseapp.com",
            projectId: "perfect-routine-pro",
            storageBucket: "perfect-routine-pro.firebasestorage.app",
            messagingSenderId: "1032207716162",
            appId: "1:1032207716162:web:8f372b2d282dff5baa42db",
            measurementId: "G-BNQJBQ9YGP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentSub = 'daily', viewMonth = new Date().getMonth(), viewYear = new Date().getFullYear();
        document.getElementById('datePicker').valueAsDate = new Date();

        // --- AUTH & PROFILE ---
        async function handleAction(type) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert("Lỗi đăng nhập: " + err.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Chào " + (user.displayName || "Ngọc") + "!";
                if(user.photoURL) document.getElementById('userAvatar').src = user.photoURL;
                loadData();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        });

        async function updateProfile() {
            const n = prompt("Tên của bạn:", auth.currentUser.displayName || "Ngọc");
            const a = prompt("Link ảnh đại diện (URL):", auth.currentUser.photoURL || "");
            if(n !== null || a !== null) {
                try {
                    await auth.currentUser.updateProfile({ 
                        displayName: n || auth.currentUser.displayName, 
                        photoURL: a || auth.currentUser.photoURL 
                    });
                    location.reload();
                } catch(err) { alert("Không thể cập nhật: " + err.message); }
            }
        }

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.getElementById('tabTasks').className = tab === 'tasks' ? 'flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase tracking-widest' : 'flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase tracking-widest';
            document.getElementById('tabDetails').className = tab === 'details' ? 'flex-1 py-2 text-xs font-bold rounded-xl transition tab-active uppercase tracking-widest' : 'flex-1 py-2 text-xs font-bold text-slate-500 rounded-xl transition uppercase tracking-widest';
            document.getElementById('taskView').style.display = tab === 'tasks' ? 'block' : 'none';
            document.getElementById('detailsView').style.display = tab === 'details' ? 'block' : 'none';
            if(tab === 'details') { generateCalendar(); loadDailyReport(); }
        }

        function switchSub(type) {
            currentSub = type;
            document.getElementById('subD').className = type === 'daily' ? 'text-indigo-400 border-b-2 border-indigo-400 pb-1 transition-all' : 'pb-1 transition-all';
            document.getElementById('subO').className = type === 'once' ? 'text-indigo-400 border-b-2 border-indigo-400 pb-1 transition-all' : 'pb-1 transition-all';
            loadData();
        }

        function dateChanged() { loadData(); if(document.getElementById('detailsView').style.display === 'block') loadDailyReport(); }

        // --- TASK LOGIC ---
        async function addTask() {
            const text = document.getElementById('taskInput').value, date = document.getElementById('datePicker').value;
            if(!text) return;
            await db.collection("tasks").add({ uid: auth.currentUser.uid, text, type: currentSub, date, done: false, doneDates: [], timestamp: Date.now() });
            document.getElementById('taskInput').value = "";
            loadData();
        }

        async function loadData() {
            const date = document.getElementById('datePicker').value, list = document.getElementById('taskList');
            list.innerHTML = "";
            const snap = await db.collection("tasks").where("uid", "==", auth.currentUser.uid).get();
            let doneCount = 0, total = 0;

            snap.forEach(doc => {
                const data = doc.data();
                const isToday = data.type === 'daily' || data.date === date;
                const isDoneToday = data.type === 'daily' ? (data.doneDates && data.doneDates.includes(date)) : (data.date === date && data.done);
                
                if(isToday) { total++; if(isDoneToday) doneCount++; }

                if(data.type === currentSub) {
                    if(currentSub === 'once' && data.date !== date) return;
                    const item = document.createElement('div');
                    item.className = `glass p-4 rounded-2xl flex justify-between items-center transition-all ${isDoneToday ? 'opacity-30 grayscale' : ''}`;
                    item.innerHTML = `<span class="text-sm font-bold ${isDoneToday ? 'line-through text-slate-500' : 'text-white'}">${data.text}</span>
                        <div class="flex gap-2">
                            <button onclick="toggleTask('${doc.id}', ${isDoneToday})" class="w-9 h-9 rounded-full ${isDoneToday ? 'bg-indigo-500' : 'bg-white/5'} flex items-center justify-center border border-white/10 transition-all">${isDoneToday ? '✓' : ''}</button>
                            <button onclick="deleteTask('${doc.id}')" class="p-2 opacity-10 hover:opacity-100">🗑️</button>
                        </div>`;
                    list.appendChild(item);
                }
            });

            const p = total === 0 ? 0 : Math.round((doneCount/total)*100);
            document.getElementById('progressBar').style.width = p + "%";
            document.getElementById('percentText').innerText = p + "%";
            document.getElementById('streakCount').innerText = (p >= 80 ? "🔥 " : "🌑 ") + (p >= 80 ? "1+" : "0") + " Ngày";
            document.getElementById('summaryText').innerText = `${doneCount}/${total} Hoàn thành`;
        }

        async function toggleTask(id, isDone) {
            const date = document.getElementById('datePicker').value, ref = db.collection("tasks").doc(id);
            if(currentSub === 'daily') {
                if(!isDone) await ref.update({ doneDates: firebase.firestore.FieldValue.arrayUnion(date) });
                else await ref.update({ doneDates: firebase.firestore.FieldValue.arrayRemove(date) });
            } else await ref.update({ done: !isDone });
            loadData();
        }

        async function deleteTask(id) { if(confirm("Xóa mục tiêu?")) { await db.collection("tasks").doc(id).delete(); loadData(); } }

        // --- REPORT & CALENDAR ---
        async function loadDailyReport() {
            const date = document.getElementById('datePicker').value;
            const doc = await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('diaryInput').value = d.content || "";
                document.getElementById('reportScreenTime').value = d.screenTime || "";
                document.getElementById('reportEnergy').value = d.energy || "";
                document.getElementById('reportBigWin').value = d.bigWin || "";
            } else {
                ['diaryInput','reportScreenTime','reportEnergy','reportBigWin'].forEach(id => document.getElementById(id).value = "");
            }
        }

        async function saveDailyReport() {
            const date = document.getElementById('datePicker').value;
            const report = {
                uid: auth.currentUser.uid, date,
                content: document.getElementById('diaryInput').value,
                screenTime: document.getElementById('reportScreenTime').value,
                energy: document.getElementById('reportEnergy').value,
                bigWin: document.getElementById('reportBigWin').value
            };
            await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).set(report, { merge: true });
            alert("Đã ghi nhận nỗ lực của bạn! 💪");
        }

        function changeMonth(s) { viewMonth += s; if(viewMonth>11){viewMonth=0; viewYear++;} if(viewMonth<0){viewMonth=11; viewYear--;} generateCalendar(); }
        async function generateCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
            document.getElementById('monthLabel').innerText = `Tháng ${viewMonth + 1}, ${viewYear}`;
            const first = new Date(viewYear, viewMonth, 1).getDay(), days = new Date(viewYear, viewMonth + 1, 0).getDate();
            const snap = await db.collection("tasks").where("uid", "==", auth.currentUser.uid).get();
            const all = []; snap.forEach(d => all.push(d.data()));

            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const div = document.createElement('div'), dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                div.className = `calendar-day ${document.getElementById('datePicker').value === dateStr ? 'active' : ''}`;
                div.innerHTML = `<span>${d}</span>`;
                
                let done = 0, totalInDay = 0;
                all.forEach(t => {
                    if(t.type === 'daily' || t.date === dateStr) {
                        totalInDay++;
                        if(t.type === 'daily' ? (t.doneDates && t.doneDates.includes(dateStr)) : t.done) done++;
                    }
                });
                if(totalInDay > 0 && (done/totalInDay) >= 0.8) div.innerHTML += `<span class="text-[8px] mt-0.5">🔥</span>`;
                div.onclick = () => { document.getElementById('datePicker').value = dateStr; dateChanged(); generateCalendar(); };
                grid.appendChild(div);
            }
        }
    </script>
</body>
</html>
