<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motivation by Duc</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #020617;
            background-image: radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                              radial-gradient(at 0% 100%, rgba(244, 63, 94, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px) saturate(160%); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .tab-active { 
            background: rgba(99, 102, 241, 0.8);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Calendar Styles */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);
        }
        .calendar-day:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .calendar-day.active { border: 1px solid #6366f1; background: rgba(99, 102, 241, 0.2); }
        .streak-icon { font-size: 10px; margin-top: 2px; }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-24">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-sm text-center">
            <div class="text-6xl mb-6">💎</div>
            <h1 class="text-3xl font-black mb-1 text-white italic">PEROUTINEPRO</h1>
            <p class="text-slate-400 mb-10 text-[10px] uppercase tracking-[0.3em] font-semibold">Áp lực tạo kim cương</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 rounded-2xl border border-white/10 outline-none">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-8 bg-white/5 rounded-2xl border border-white/10 outline-none">
            <button onclick="handleAction('login')" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold shadow-lg transition active:scale-95">Bắt đầu kỷ luật</button>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-xl mx-auto p-4 sm:p-6">
        
        <header class="flex justify-between items-center mb-10 pt-6">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img id="userAvatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-14 h-14 rounded-2xl object-cover border-2 border-white/10 shadow-xl">
                    <button onclick="updateProfile()" class="absolute -bottom-1 -right-1 bg-indigo-500 text-white p-1 rounded-lg text-[10px]">✏️</button>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-white" id="userNameDisplay">Chào Ngọc</h2>
                    <span id="streakCount" class="bg-amber-500/20 text-amber-500 px-2 py-0.5 rounded text-[10px] font-black uppercase">🔥 0 Ngày</span>
                </div>
            </div>
            <button onclick="auth.signOut()" class="glass-panel w-10 h-10 rounded-xl flex items-center justify-center opacity-50 hover:opacity-100 transition">🚪</button>
        </header>

        <div class="glass-panel p-6 rounded-[2rem] mb-8">
            <div class="flex justify-between items-center mb-5">
                <input type="date" id="datePicker" class="bg-transparent text-xl font-bold text-indigo-400 outline-none" onchange="dateChanged()">
                <span id="percentText" class="text-3xl font-black text-white">0%</span>
            </div>
            <div class="w-full bg-black/20 h-2.5 rounded-full overflow-hidden border border-white/5">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-rose-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex mb-8 p-1.5 glass-panel rounded-2xl">
            <button onclick="switchTab('daily')" id="tabDaily" class="flex-1 py-2.5 text-xs font-bold rounded-xl transition tab-active">Công việc</button>
            <button onclick="switchTab('achievements')" id="tabAchieve" class="flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-xl transition">Lịch & Nhật ký</button>
        </nav>

        <div id="contentBox">
            <div id="taskView">
                <div class="flex gap-2 mb-8 glass-panel p-1.5 rounded-2xl">
                    <input type="text" id="taskInput" placeholder="Mục tiêu tiếp theo..." class="flex-1 p-3 bg-transparent outline-none text-sm ml-2">
                    <button onclick="addTask()" class="bg-indigo-600 w-11 h-11 rounded-xl font-bold text-2xl active:scale-90 transition">+</button>
                </div>
                <div id="taskList" class="space-y-4"></div>
            </div>

            <div id="achievementView" class="hidden space-y-8">
                <div class="glass-panel p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Lịch vinh danh</h3>
                        <span class="text-[10px] text-indigo-400 font-bold" id="monthLabel">Tháng 5, 2026</span>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center text-[9px] font-black text-slate-600 uppercase mb-3">
                        <div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Nhật ký ngày <span id="diaryDateLabel">...</span></h3>
                    <textarea id="diaryInput" placeholder="Hôm nay bạn cảm thấy thế nào? Những gì đã làm tốt..." class="w-full h-32 bg-white/5 rounded-2xl p-4 text-sm outline-none border border-white/5 focus:border-indigo-500/30 transition-all"></textarea>
                    <button onclick="saveDiary()" class="mt-4 w-full bg-slate-800 p-3 rounded-xl text-xs font-bold hover:bg-slate-700 transition">Lưu nhật ký</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDR2TYq-l5Fxzcx5dQ0a6OUEOHIQItZ2gE",
            authDomain: "perfect-routine-pro.firebaseapp.com",
            projectId: "perfect-routine-pro",
            storageBucket: "perfect-routine-pro.firebasestorage.app",
            messagingSenderId: "1032207716162",
            appId: "1:1032207716162:web:8f372b2d282dff5baa42db",
            measurementId: "G-BNQJBQ9YGP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentTab = 'daily';
        document.getElementById('datePicker').valueAsDate = new Date();

        async function handleAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = "Chào " + (user.displayName || "Ngọc");
                if(user.photoURL) document.getElementById('userAvatar').src = user.photoURL;
                loadData();
                generateCalendar();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        });

        async function updateProfile() {
            const n = prompt("Tên của bạn:", auth.currentUser.displayName || "Ngọc");
            const a = prompt("Link ảnh đại diện:", auth.currentUser.photoURL || "");
            if(n || a) {
                await auth.currentUser.updateProfile({ displayName: n, photoURL: a });
                location.reload();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabDaily').className = tab === 'daily' ? "flex-1 py-2.5 text-xs font-bold rounded-xl transition tab-active" : "flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-xl transition";
            document.getElementById('tabAchieve').className = tab === 'achievements' ? "flex-1 py-2.5 text-xs font-bold rounded-xl transition tab-active" : "flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-xl transition";
            
            document.getElementById('taskView').style.display = tab === 'daily' ? 'block' : 'none';
            document.getElementById('achievementView').style.display = tab === 'achievements' ? 'block' : 'none';
            if(tab === 'achievements') {
                generateCalendar();
                loadDiary();
            }
        }

        function dateChanged() {
            loadData();
            if(currentTab === 'achievements') loadDiary();
        }

        async function addTask() {
            const text = document.getElementById('taskInput').value;
            const date = document.getElementById('datePicker').value;
            if(!text) return;
            await db.collection("tasks").add({
                uid: auth.currentUser.uid, text, type: 'daily', date, doneDates: [], timestamp: Date.now()
            });
            document.getElementById('taskInput').value = "";
            loadData();
            generateCalendar();
        }

        async function loadData() {
            const date = document.getElementById('datePicker').value;
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const snap = await db.collection("tasks").where("uid", "==", auth.currentUser.uid).get();
            
            let doneCount = 0, total = 0;
            snap.forEach(doc => {
                total++;
                const data = doc.data();
                const isDone = data.doneDates && data.doneDates.includes(date);
                if(isDone) doneCount++;

                const item = document.createElement('div');
                item.className = `glass-panel p-4 rounded-2xl flex justify-between items-center ${isDone ? 'opacity-40' : ''}`;
                item.innerHTML = `
                    <span class="text-sm font-semibold ${isDone ? 'line-through text-slate-500' : 'text-white'}">${data.text}</span>
                    <div class="flex gap-2">
                        <button onclick="toggleTask('${doc.id}', ${isDone})" class="w-9 h-9 rounded-full ${isDone ? 'bg-indigo-500' : 'bg-white/5'} flex items-center justify-center border border-white/10 transition-all">${isDone ? '✓' : ''}</button>
                        <button onclick="deleteTask('${doc.id}')" class="p-2 opacity-10 hover:opacity-100">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });
            updateProgress(doneCount, total);
        }

        async function toggleTask(id, isDone) {
            const date = document.getElementById('datePicker').value;
            const ref = db.collection("tasks").doc(id);
            if(!isDone) await ref.update({ doneDates: firebase.firestore.FieldValue.arrayUnion(date) });
            else await ref.update({ doneDates: firebase.firestore.FieldValue.arrayRemove(date) });
            loadData();
            generateCalendar();
        }

        async function deleteTask(id) {
            if(confirm("Xóa nhé?")) { await db.collection("tasks").doc(id).delete(); loadData(); generateCalendar(); }
        }

        function updateProgress(done, total) {
            const p = total === 0 ? 0 : Math.round((done/total)*100);
            document.getElementById('progressBar').style.width = p + "%";
            document.getElementById('percentText').innerText = p + "%";
            document.getElementById('streakCount').innerText = (p >= 80 ? "🔥 " : "🌑 ") + (p >= 80 ? "1+" : "0") + " Ngày";
        }

        // --- CALENDAR LOGIC ---
        async function generateCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            document.getElementById('monthLabel').innerText = `Tháng ${month + 1}, ${year}`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Fetch data once for the month
            const snap = await db.collection("tasks").where("uid", "==", auth.currentUser.uid).get();
            const tasks = []; snap.forEach(d => tasks.push(d.data()));

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = document.getElementById('datePicker').value === dateStr;
                
                dayDiv.className = `calendar-day ${isSelected ? 'active' : ''}`;
                dayDiv.innerHTML = `<span>${day}</span>`;
                
                // Check success icon
                let done = 0;
                tasks.forEach(t => { if(t.doneDates && t.doneDates.includes(dateStr)) done++; });
                if(tasks.length > 0 && (done/tasks.length) >= 0.8) {
                    dayDiv.innerHTML += `<span class="streak-icon">🔥</span>`;
                }

                dayDiv.onclick = () => {
                    document.getElementById('datePicker').value = dateStr;
                    dateChanged();
                };
                grid.appendChild(dayDiv);
            }
        }

        // --- DIARY LOGIC ---
        async function loadDiary() {
            const date = document.getElementById('datePicker').value;
            document.getElementById('diaryDateLabel').innerText = date;
            const doc = await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).get();
            document.getElementById('diaryInput').value = doc.exists ? doc.data().content : "";
        }

        async function saveDiary() {
            const date = document.getElementById('datePicker').value;
            const content = document.getElementById('diaryInput').value;
            await db.collection("diaries").doc(`${auth.currentUser.uid}_${date}`).set({
                uid: auth.currentUser.uid, date, content
            });
            alert("Kỷ niệm đã được lưu lại! ✨");
        }
    </script>
</body>
</html>
